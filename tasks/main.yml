---
- include_tasks: essential.yml
- include_tasks: collect_packages.yml


# Custom applications which are more complex to install than apt install
# coolercontrol is handled by the coolercontrol role in run.yml
- include_tasks: copyq.yml

# klogg is handled by the klogg role in run.yml
- include_tasks: nomachine.yml
  when: "'nomachine' not in ansible_facts.packages"
- include_tasks: sublime.yml
  when: "'sublime-text' not in ansible_facts.packages"
- include_tasks: virtualbox.yml
  when: "'virtualbox-7.1' not in ansible_facts.packages"
- include_tasks: vscode.yml
  when: "'code' not in ansible_facts.packages"
- include_tasks: wireshark.yml
  when: "'wireshark' not in ansible_facts.packages"
- include_tasks: wine.yml
  when: "'winehq-stable' not in ansible_facts.packages"


# More private applications
- include_tasks: signal.yml
  when: is_private_machine and 'signal-desktop' not in ansible_facts.packages
- include_tasks: spotify.yml
  when: is_private_machine and 'spotify-client' not in ansible_facts.packages
- include_tasks: tailscale.yml
  when: is_private_machine
- include_tasks: xdotool.yml
