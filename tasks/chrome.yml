---
- name: Download Google Chrome .deb package
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
    dest: /tmp/google-chrome-stable_current_amd64.deb

- name: Install Google Chrome
  ansible.builtin.apt:
    deb: /tmp/google-chrome-stable_current_amd64.deb
    update_cache: yes

- name: Clean up .deb file
  ansible.builtin.file:
    path: /tmp/google-chrome-stable_current_amd64.deb
    state: absent

- name: Restrict Chrome repolib source to amd64 only (suppress i386 notice)
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/google-chrome.sources
    regexp: '^Architectures:'
    insertafter: '^Components:'
    line: 'Architectures: amd64'
  failed_when: false