---
# UBUNTU_CODENAME is not available on Debian so fallback to VERSION_CODENAME
- name: Get Ubuntu codename or fallback to VERSION_CODENAME
  shell: . /etc/os-release && echo ${UBUNTU_CODENAME:-$VERSION_CODENAME}
  register: _ubuntu_codename
  changed_when: false

- name: Set ubuntu_codename fact
  set_fact:
    ubuntu_codename: "{{ _ubuntu_codename.stdout }}"