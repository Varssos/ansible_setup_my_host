---
# UBUNTU_CODENAME is not available on Debian so fallback to VERSION_CODENAME
- name: Get Ubuntu codename or fallback to VERSION_CODENAME
  shell: . /etc/os-release && echo ${UBUNTU_CODENAME:-$VERSION_CODENAME}
  register: _ubuntu_codename
  changed_when: false

- name: Set ubuntu_codename fact
  set_fact:
    ubuntu_codename: "{{ _ubuntu_codename.stdout }}"

# geerlingguy.docker (v8) uses deb822_repository with suites: "{{ ansible_facts.distribution_release }}"
# For Linux Mint, ansible_facts.distribution_release returns the Mint codename (e.g. 'zena')
# but Docker repo needs the Ubuntu base codename (e.g. 'noble').
# Overriding ansible_facts dict so the role picks up the correct codename.
- name: Override ansible_facts.distribution_release for Linux Mint (use Ubuntu base codename)
  set_fact:
    ansible_facts: "{{ ansible_facts | combine({'distribution_release': ubuntu_codename}) }}"
  when: ansible_distribution == "Linux Mint"