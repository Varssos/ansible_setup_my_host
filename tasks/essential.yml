---
# grub-pc ends up in partially-configured state after Vagrant provisioning on Debian.
# Pre-set debconf to accept empty install devices so dpkg --configure can finish.
- name: Pre-configure grub-pc to use no install devices (Debian Vagrant fix)
  ansible.builtin.shell: |
    echo "grub-pc grub-pc/install_devices_empty boolean true" | debconf-set-selections
    echo "grub-pc grub-pc/install_devices string" | debconf-set-selections
    dpkg --force-confdef --configure grub-pc
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: ansible_distribution == "Debian"
  changed_when: false
  failed_when: false

- name: Update packages
  ansible.builtin.apt:
    update_cache: yes
    upgrade: yes
  environment:
    DEBIAN_FRONTEND: noninteractive
  retries: 3
  delay: 10
  register: result
  until: result is success

- name: Install essential packages
  ansible.builtin.package:
    name: "{{ apt_packages }}"
    state: present


- name: Install flatpak
  ansible.builtin.apt:
    name: flatpak
    state: present

- name: Add Flathub repository
  ansible.builtin.command: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
  changed_when: false

- name: Install packages with Flatpak
  community.general.flatpak:
    name: "{{ flatpak_packages }}"
    state: present
    remote: flathub

