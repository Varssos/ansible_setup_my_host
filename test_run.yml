---
- hosts: vagrant
  become: yes
  vars:
    is_private_machine: true

  pre_tasks:
    - name: Set ubuntu_codename fact
      import_role:
        name: ubuntu-codename

  tasks:
    - import_tasks: tasks/main.yml

  roles:
    - geerlingguy.pip
    - geerlingguy.docker
    - dotfiles
    - chrome
    - coolercontrol
    - fzf
    - grub-customizer
    - klogg
    - nomachine
    