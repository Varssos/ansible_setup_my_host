# Set to true on personal machines to also install private packages
is_private_machine: false

apt_packages:
  # basic tools
  - apt-transport-https
  - vim
  - htop
  - screenfetch
  - curl

  # Usefull tools
  - speedtest-cli
  - filezilla
  - meld
  - kdiff3
  - shutter
  - remmina
  - gparted
  - xdotool
  - shellcheck
  - gimp
  - nmap
  - libimage-exiftool-perl

  # automotive
  - dlt-viewer

apt_packages_private:
  - anki # Not available on Ubuntu 25.04
  - rpi-imager # Not available on Debian 13.1



flatpak_packages:
  - net.werwolv.ImHex

flatpak_packages_private:
  - com.brave.Browser
  - com.discordapp.Discord
  - com.spotify.Client


# Roles variables
## geerlingguy.docker
# Note: geerlingguy.docker v8 uses deb822_repository with suites: ansible_facts.distribution_release
# For Linux Mint, this is overridden in tasks/set_ubuntu_codename.yml (pre_tasks)
# to use the Ubuntu base codename (UBUNTU_CODENAME from /etc/os-release) instead of Mint's codename.
docker_users:
  - "{{ ansible_user }}"